project:
  type: book
  output-dir: _output

bibliography: references.bib
csl: apa.csl

book:
  title: "Recurso Educativo para el Despliegue de Ecosistemas de Centralización de Logs Mediante Docker"
  subtitle: "Marco conceptual, guía de estudio, guía docente y nueve guías prácticas reproducibles"
  author:
    - name: "Christian Andrés Candela Uribe"
      degree: "Ph.D."
      affiliation: "Profesor Asociado, Universidad del Quindío"
      orcid: "0000-0002-3961-1840"
    - name: "Paola Andrea Acero Franco"
      degree: "M.Sc."
      affiliation: "Profesor Asociado, Universidad del Quindío"
      orcid: "0009-0005-6538-5030"
    - name: "Luis Eduardo Sepúlveda Rodríguez"
      degree: "Ph.D."
      affiliation: "Profesor Asociado, Universidad del Quindío"
      orcid: "0000-0003-2446-0602"
  date: "2026"
  date-format: "YYYY"
  language: es
  reader-mode: true

  chapters:
    - index.qmd
    - part: "Documento base"
      chapters:
        - _generated/01-introduccion-objetivos.qmd
        - _generated/02-metodologia.qmd
        - _generated/03-marco-conceptual.qmd
        - _generated/04-alcance-conclusiones.qmd
    - part: "Material de estudio y docencia"
      chapters:
        - 02-guia-estudio.qmd
        - 03-guia-docente.qmd
    - part: "Guías prácticas"
      chapters:
        - guias/01-elk.qmd
        - guias/02-olo.qmd
        - guias/03-fluentd.qmd
        - guias/04-promtail.qmd
        - guias/05-gelf-graylog.qmd
        - guias/06-otel.qmd
        - guias/07-vector.qmd
        - guias/08-signoz.qmd
        - guias/09-alloy.qmd
#  appendices:
    - _generated/99-referencias.qmd

  page-footer:
    left: "© 2026 Universidad del Quindío"
    center: "Versión 1.0.0"
    right: "CC BY-SA 4.0"

lang: es
link-citations: true       # citas en el texto clicables -> entrada en la bibliografía
link-bibliography: true     # enlaces (DOI/URL) clicables dentro de la bibliografía

# Localización de etiquetas de callout no traducidas por Quarto al español
language:
  callout-tip-title: "Sugerencia"

filters:
  - mermaid-filter.lua
  - strip-emojis.lua
  - strip-svg-images.lua
  - replace-repo-links.lua
  - clean-headers.lua


format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    code-copy: true
  typst:
    citeproc: true
    toc: true
    toc-title: "Tabla de contenido"
    section-numbering: 1.1.1
    number-sections: true
    number-depth: 4
    columns: 1
    paper: us-letter
    papersize: us-letter
    fig-pos: H
    keep-typ: true
    template-partials:
      - typst-show.typ
    include-in-header:
      - typst/tablas-tema.typ
      - typst/estilos.typ
