services:
  logs.producer:
    mem_limit: ${PRODUCER_MEM_LIMIT:-512m}
    build:
      context: logs.producer
      dockerfile: src/main/docker/Dockerfile.compose
    ports:
      - "8080:8080"
    environment:
      FLUENTD_HOST: fluentd
    depends_on:
      fluentd:
        condition: service_healthy
  elasticsearch:
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-2g}
    image: docker.io/elasticsearch:9.4.1
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      discovery.type: "single-node"
      cluster.routing.allocation.disk.threshold_enabled: false
      xpack.security.enabled: false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    mem_limit: ${KIBANA_MEM_LIMIT:-1g}
    image: docker.io/kibana:9.4.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      xpack.fleet.enabled: "false"
    depends_on:
      elasticsearch:
        condition: service_healthy

  fluentd:
    mem_limit: ${FLUENTD_MEM_LIMIT:-512m}
    build: ./fluentd
    container_name: fluentd
    volumes:
      - source: ./fluentd/conf
        target: /fluentd/etc
        type: bind
    ports:
      - "4560:4560"
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    healthcheck:
      test: ["CMD-SHELL", "ruby -rsocket -e 'TCPSocket.new(\"127.0.0.1\", 4560).close' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es_data:
