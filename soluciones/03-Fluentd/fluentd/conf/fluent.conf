<source>
  @type tcp
  port 4560
  bind 0.0.0.0
  <parse>
    @type json
  </parse>
  tag app.logs
</source>

<match app.logs>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || 9200}"
  logstash_format true
  logstash_prefix logs
  <buffer>
    @type file
    path /fluentd/log/buffers/app
    flush_interval 5s
  </buffer>
</match>
