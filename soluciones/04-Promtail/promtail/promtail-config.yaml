server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: java_apps
    static_configs:
      - targets:
          - localhost
        labels:
          job: quarkus_app
          environment: dev
          __path__: /var/log/app_logs/*.log
    pipeline_stages:
      - regex:
          expression: '"log\.level":"(?P<level>[^"]+)"'
      - labels:
          level:
