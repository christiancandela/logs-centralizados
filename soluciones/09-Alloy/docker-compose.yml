services:
  logs.producer:
    build:
      context: logs.producer
      dockerfile: src/main/docker/Dockerfile.compose
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/deployments/logs
    depends_on:
      alloy:
        condition: service_healthy

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./logs:/var/log/app:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    healthcheck:
      # La imagen de Alloy no incluye wget ni curl.
      # Verificamos que el puerto 12345 esté en estado LISTEN vía /proc/net/tcp6.
      test: ["CMD-SHELL", "grep -q '3039' /proc/net/tcp6 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      loki:
        condition: service_healthy

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    volumes:
      - source: ./grafana/provisioning
        target: /etc/grafana/provisioning
        type: bind
    depends_on:
      loki:
        condition: service_healthy

volumes:
  alloy_data:
