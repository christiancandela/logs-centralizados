services:
  logs.producer:
    build:
      context: logs.producer
      dockerfile: src/main/docker/Dockerfile.compose
    mem_limit: ${PRODUCER_MEM_LIMIT:-512m}
    ports:
      - "8080:8080"
    environment:
      LOGSTASH_HOST: logstash
    depends_on:
      logstash:
        condition: service_healthy

  elasticsearch:
    image: docker.io/elasticsearch:9.4.1
    container_name: elasticsearch
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-2g}
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      discovery.type: "single-node"
      cluster.routing.allocation.disk.threshold_enabled: false
      xpack.security.enabled: false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  logstash:
    image: docker.io/logstash:9.4.1
    container_name: logstash
    mem_limit: ${LOGSTASH_MEM_LIMIT:-1g}
    volumes:
      - source: ./logstash/pipelines
        target: /usr/share/logstash/pipeline
        type: bind
    ports:
      - "4560:4560"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.io/kibana:9.4.1
    container_name: kibana
    mem_limit: ${KIBANA_MEM_LIMIT:-1g}
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      xpack.fleet.enabled: "false"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es_data:
