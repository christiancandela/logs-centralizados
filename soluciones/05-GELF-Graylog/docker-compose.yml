services:
  logs.producer:
    build:
      context: logs.producer
      dockerfile: src/main/docker/Dockerfile.compose
    mem_limit: ${PRODUCER_MEM_LIMIT:-512m}
    ports:
      - "8080:8080"
    environment:
      GRAYLOG_HOST: graylog
    depends_on:
      graylog:
        condition: service_healthy

  mongo:
    image: mongo:7.0
    container_name: mongo
    mem_limit: ${MONGODB_MEM_LIMIT:-512m}
    volumes:
      - mongo_data:/data/db

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    mem_limit: ${OPENSEARCH_MEM_LIMIT:-2g}
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  graylog:
    image: graylog/graylog:7.1.1-1
    container_name: graylog
    mem_limit: ${GRAYLOG_MEM_LIMIT:-1g}
    ports:
      - "9000:9000"
      - "12201:12201/udp"
      - "1514:1514"
    environment:
      GRAYLOG_MONGODB_URI: mongodb://mongo:27017/graylog
      GRAYLOG_HTTP_EXTERNAL_URI: "http://127.0.0.1:9000/"
      GRAYLOG_HTTP_BIND_ADDRESS: "0.0.0.0:9000"
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://opensearch:9200"
      # Reduce journal size to fit in Docker Desktop disk limits (default is 5 GB)
      GRAYLOG_MESSAGE_JOURNAL_MAX_SIZE: "512mb"
      # CHANGE ME (must be at least 16 characters)
      GRAYLOG_PASSWORD_SECRET: "forpasswordencryption"
      # Password: admin
      GRAYLOG_ROOT_PASSWORD_SHA2: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"
    volumes:
      - graylog_data:/usr/share/graylog/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/lbstatus | grep -q ALIVE || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      mongo:
        condition: service_started
      opensearch:
        condition: service_healthy
    entrypoint: "/usr/bin/tini -- /docker-entrypoint.sh"

volumes:
  mongo_data:
  opensearch_data:
  graylog_data:
